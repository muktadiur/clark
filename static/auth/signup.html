{% extends "base.html" %}

{% block title %}
  <title>Clark::Sign up</title>
{% endblock %}

{% block content %}
    <div>
        <ul class="top-nav">
            <li><a href="/home">Home</a></li>
            <li><a href="/login">Log in</a></li>
        </ul>
    </div>
    <div class="container">
        <div class="header"><h2>Clark</h2></div>
    </div>

    <h3 class="center">Sign up</h3>
    <div class="auth-container">
        <div class="login-container">
            <form class="auth-form" id="signupForm" novalidate>
                <div class="form-group">
                    <input type="email" class="form-input" id="email" placeholder="Email" required autocomplete="email" />
                </div>
                <div class="form-group">
                    <input type="password" class="form-input" id="password" placeholder="Password" required autocomplete="new-password" />
                </div>
                <div class="form-group">
                    <input type="password" class="form-input" id="confirmPassword" placeholder="Confirm password" required autocomplete="new-password" />
                </div>
                <div id="signupError" class="error-message"></div>
                <button type="submit" class="submit-btn">Create account</button>
                <div class="center" style="margin-top: 14px;">
                    <a class="link" href="/login">Already have an account? Log in</a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorDiv = document.getElementById('signupError');
        errorDiv.textContent = '';

        if (password !== confirmPassword) {
            errorDiv.textContent = 'Passwords do not match.';
            return;
        }
        if (password.length < 8) {
            errorDiv.textContent = 'Password must be at least 8 characters.';
            return;
        }

        try {
            const res = await fetch('/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password }),
            });
            if (res.ok) {
                window.location.href = '/login';
            } else {
                const data = await res.json();
                errorDiv.textContent = data.detail || 'Sign up failed. Please try again.';
            }
        } catch {
            errorDiv.textContent = 'Something went wrong. Please try again.';
        }
    });
</script>
{% endblock %}
