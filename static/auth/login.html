{% extends "base.html" %}

{% block title %}
  <title>Clark::Login</title>
{% endblock %}

{% block content %}
    <div>
        <ul class="top-nav">
            <li><a href="/home">Home</a></li>
            <li><a href="/signup">Sign up</a></li>
        </ul>
    </div>
    <div class="container">
        <div class="header"><h2>Clark</h2></div>
    </div>

    <h3 class="center">Log in</h3>
    <div class="auth-container">
        <div class="login-container">
            <form class="auth-form" id="loginForm" novalidate>
                <div class="form-group">
                    <input type="email" class="form-input" id="email" placeholder="Email" required autocomplete="email" />
                </div>
                <div class="form-group">
                    <input type="password" class="form-input" id="password" placeholder="Password" required autocomplete="current-password" />
                </div>
                <div id="loginError" class="error-message"></div>
                <button type="submit" class="submit-btn">Log in</button>
                <div class="center" style="margin-top: 14px;">
                    <a class="link" href="/signup">Don't have an account? Sign up</a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('loginError');
        errorDiv.textContent = '';

        try {
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password }),
            });
            if (res.ok) {
                window.location.href = '/';
            } else {
                const data = await res.json();
                errorDiv.textContent = data.detail || 'Login failed. Please try again.';
            }
        } catch {
            errorDiv.textContent = 'Something went wrong. Please try again.';
        }
    });
</script>
{% endblock %}
